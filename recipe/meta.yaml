{% set name = "hws" %}
{% set version = "2.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/hws-{{ version }}.tar.gz
  sha256: 40e5b09357e4c5038da959f7513d82ae9d3267c37435e046c6b72ac3b8518453

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 1

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=45
    - wheel
    - setuptools-scm >=6.2
    - pip
  run:
    - python >={{ python_min }}
    - numpy
    - scipy
    - matplotlib-base
    - h5py
    - scikit-image

test:
  imports:
    - HWS
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://git.ligo.org/HWS/hws
  summary: Python toolbox for analysing Hartmann Wavefront sensor data for the LIGO and Virgo detectors
  license: GPL-3.0-only
  license_file: LICENSE.md

extra:
  recipe-maintainers:
    - danielbrown2
